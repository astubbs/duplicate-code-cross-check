name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  validate-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml
        run: |
          # Ensure action.yml is valid YAML
          python3 -c "import yaml, sys; yaml.safe_load(open('action.yml'))"
          echo "action.yml is valid YAML"
